stacks: [support]
regions: [eu-west-1]
allowedStages:
  - CODE
  - PROD
deployments:
  cfn:
    type: cloud-formation
    app: supporter-product-data-ts
    parameters:
      templateStagePaths:
        CODE: SupporterProductDataTS-CODE.template.json
        PROD: SupporterProductDataTS-PROD.template.json
  supporter-product-data-ts:
    type: aws-lambda
    parameters:
      bucket: supporter-product-data-ts-dist
      functionNames:
        - "-SupporterProductDataTSQueryZuora-"
        - "-SupporterProductDataTSFetchResults-"
        - "-SPDTS-AddToQueue-"
        - "-SPDTS-ProcessItem-"
      fileName: supporter-product-data-ts.zip
    dependencies: [cfn]
