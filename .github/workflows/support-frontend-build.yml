name: Build support-frontend

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  GU_SUPPORT_WORKERS_LOAD_S3_CONFIG: false

jobs:
  support_frontend_build:
    if: >-
      (github.actor != 'dependabot[bot]') &&
        (github.repository_owner == 'guardian' ||
          github.event_name == 'push')

    # Required by actions-assume-aws-role
    permissions:
      id-token: write
      contents: read

    name: support-frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Env
        run: env

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      - name: Build the html used for SSR pages
        run: pnpm --filter support-frontend build-ssr

      - name: Build assets
        run: pnpm --filter support-frontend build-prod

      - name: Build CFN from CDK
        run: ./script/ci
        working-directory: cdk

      - name: TypeScript support-backend test and build
        run: |
          pnpm --filter support-backend test
          pnpm --filter support-backend build
          pnpm --filter support-backend  --prod deploy --legacy ../support-backend/target_node_modules
          pushd support-backend
          mv target_node_modules/node_modules ./target/
          tar -czf support-backend.tar.gz target
          popd

      # Required by sbt riffRaffUpload
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Scala
        uses: guardian/setup-scala@v1

      - name: Build, test, and upload to RiffRaff
        run: |
          export LAST_TEAMCITY_BUILD=10000
          export GITHUB_RUN_NUMBER=$(( $GITHUB_RUN_NUMBER + $LAST_TEAMCITY_BUILD ))
          sbt "project support-frontend" test riffRaffUpload
