name: Build supporter-product-data-typescript

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  supporter_product_data_typescript_build:
    if: >-
      (github.actor != 'dependabot[bot]') &&
        (github.repository_owner == 'guardian' ||
          github.event_name == 'push')

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    name: supporter-product-data-typescript build
    runs-on: ubuntu-latest
    steps:
      - name: Env
        run: env

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      - name: Build and test
        run: pnpm --filter supporter-product-data-typescript package

      - name: Upload to riff-raff
        uses: guardian/actions-riff-raff@v4
        with:
          projectName: support:supporter-product-data-typescript
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          buildNumberOffset: 12000
          config: |
            stacks: [support]
            regions: [eu-west-1]
            allowedStages:
              - CODE
              - PROD
            deployments:
              cfn:
                type: cloud-formation
                app: supporter-product-data-typescript
                parameters:
                  templateStagePaths:
                    CODE: SupporterProductDataTypescript-CODE.template.json
                    PROD: SupporterProductDataTypescript-PROD.template.json
              supporter-product-data-typescript:
                type: aws-lambda
                parameters:
                  bucket: supporter-product-data-typescript-dist
                  functionNames:
                    - "-SupporterProductDataTsQueryZuora-"
                    - "-SupporterProductDataTsFetchResults-"
                    - "-SPDTS-AddToQueue-"
                    - "-SPDTS-ProcessItem-"
                  fileName: supporter-product-data-typescript.zip
                dependencies: [cfn]
          contentDirectories: |
            cfn:
              - supporter-product-data-typescript/cdk/cdk.out/SupporterProductDataTypescript-CODE.template.json
              - supporter-product-data-typescript/cdk/cdk.out/SupporterProductDataTypescript-PROD.template.json
            supporter-product-data-typescript:
              - supporter-product-data-typescript/target/typescript/supporter-product-data-typescript.zip
