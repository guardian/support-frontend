stacks: [support]
regions: [eu-west-1]
allowedStages:
  - CODE
  - PROD
deployments:
  assets-static:
    type: aws-s3
    parameters:
      bucket: support-frontend-static
      prefixPackage: false
      prefixStack: false
      cacheControl: public, max-age=31536000
      publicReadAcl: true
  cfn-frontend:
    type: cloud-formation
    app: frontend
    parameters:
      templateStagePaths:
        CODE: Frontend-CODE.template.json
        PROD: Frontend-PROD.template.json
      amiParameter: AMIFrontend
      amiTags:
        Recipe: jammy-membership-java21
        AmigoStage: PROD
      amiEncrypted: true
  frontend:
    type: autoscaling
    dependencies: [cfn-frontend, assets-static]
    parameters:
      bucket: membership-dist
  cfn-backend:
    type: cloud-formation
    app: support-backend
    parameters:
      templateStagePaths:
        CODE: Backend-CODE.template.json
        PROD: Backend-PROD.template.json
      amiParameter: AMISupportbackend
      amiTags:
        Recipe: jammy-membership-node24
        AmigoStage: PROD
      amiEncrypted: true
  support-backend:
    type: autoscaling
    dependencies: [cfn-backend]
    parameters:
      bucket: membership-dist
